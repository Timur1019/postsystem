# Production stack — запуск на Ubuntu-сервере:
#   cp .env.example .env && nano .env
#   docker compose -f docker-compose.prod.yml up -d --build

services:
  postgres:
    image: postgres:15-alpine
    container_name: aurent-pos-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pos_db}
      POSTGRES_USER: ${POSTGRES_USER:-pos_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      TZ: ${TZ:-Asia/Tashkent}
    volumes:
      - pos_pg_data:/var/lib/postgresql/data
      - ./web-backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./web-backend/src/main/resources/db/migration_manual_customer_orders.sql:/docker-entrypoint-initdb.d/02-customer_orders.sql:ro
      - ./web-backend/src/main/resources/db/migration_manual_cash_register_configs.sql:/docker-entrypoint-initdb.d/03-cash_register_configs.sql:ro
      - ./web-backend/src/main/resources/db/migration_manual_companies_stores_users.sql:/docker-entrypoint-initdb.d/04-companies_stores_users.sql:ro
      - ./web-backend/src/main/resources/db/migration_manual_sales_store.sql:/docker-entrypoint-initdb.d/05-sales_store.sql:ro
      - ./web-backend/src/main/resources/db/migration_manual_z_reports_from_sales.sql:/docker-entrypoint-initdb.d/06-z_reports_from_sales.sql:ro
      - ./web-backend/src/main/resources/db/migration_manual_cashier_shifts.sql:/docker-entrypoint-initdb.d/07-cashier_shifts.sql:ro
      - ./web-backend/src/main/resources/db/migration_manual_product_discount.sql:/docker-entrypoint-initdb.d/08-product_discount.sql:ro
      - ./web-backend/src/main/resources/db/migration_manual_sale_payment_split.sql:/docker-entrypoint-initdb.d/09-sale_payment_split.sql:ro
      - ./web-backend/src/main/resources/db/migration_manual_user_module_access.sql:/docker-entrypoint-initdb.d/10-user_module_access.sql:ro
      - ./web-backend/src/main/resources/db/migration_manual_uz_invoice_document_id.sql:/docker-entrypoint-initdb.d/11-uz_invoice_document_id.sql:ro
      - ./web-backend/src/main/resources/db/migration_manual_sale_item_returned_qty.sql:/docker-entrypoint-initdb.d/12-sale_item_returned_qty.sql:ro
      - ./web-backend/src/main/resources/db/migration_manual_stock_movements_enhanced.sql:/docker-entrypoint-initdb.d/13-stock_movements_enhanced.sql:ro
      - ./web-backend/src/main/resources/db/migration_manual_stock_receipts.sql:/docker-entrypoint-initdb.d/14-stock_receipts.sql:ro
      - ./web-backend/src/main/resources/db/migration_manual_stock_inventory_transfer.sql:/docker-entrypoint-initdb.d/15-stock_inventory_transfer.sql:ro
      - ./web-backend/src/main/resources/db/migration_manual_sale_order_discount.sql:/docker-entrypoint-initdb.d/16-sale_order_discount.sql:ro
      - ./web-backend/src/main/resources/db/migration_manual_z_report_discount.sql:/docker-entrypoint-initdb.d/17-z_report_discount.sql:ro
      - ./web-backend/src/main/resources/db/migration_manual_tenant_isolation.sql:/docker-entrypoint-initdb.d/18-tenant_isolation.sql:ro
    ports:
      # Только localhost сервера — для DBeaver/DataGrip через SSH (не в интернет)
      - '127.0.0.1:5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-pos_user} -d ${POSTGRES_DB:-pos_db}']
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - pos-net

  backend:
    build:
      context: ./web-backend
      dockerfile: Dockerfile
    container_name: aurent-pos-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-pos_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-pos_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-pos_db}
      DB_USERNAME: ${POSTGRES_USER:-pos_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env (min 32 chars)}
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:*,http://127.0.0.1:*}
      ORDERS_UPLOAD_DIR: /app/uploads/orders
      LOG_PATH: /app/logs
      TZ: ${TZ:-Asia/Tashkent}
    ports:
      - '${API_PORT:-8080}:8080'
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://127.0.0.1:8080/api/v1/actuator/health | grep -q UP || exit 1']
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 180s
    networks:
      - pos-net

  frontend:
    build:
      context: ./web-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_SUPPORT_PHONE: ${VITE_SUPPORT_PHONE:-}
        VITE_SUPPORT_TELEGRAM_BOT: ${VITE_SUPPORT_TELEGRAM_BOT:-}
    container_name: aurent-pos-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - '${HTTP_PORT:-80}:80'
    networks:
      - pos-net

  telegram-support-bot:
    build:
      context: ./telegram-support-bot
      dockerfile: Dockerfile
    container_name: aurent-pos-telegram-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_SUPPORT_GROUP_ID: ${TELEGRAM_SUPPORT_GROUP_ID:-}
      TZ: ${TZ:-Asia/Tashkent}
    networks:
      - pos-net

networks:
  pos-net:
    driver: bridge

volumes:
  pos_pg_data:
  backend_uploads:
  backend_logs:
