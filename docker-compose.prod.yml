# Production stack — запуск на Ubuntu-сервере:
#   cp .env.example .env && nano .env
#   docker compose -f docker-compose.prod.yml up -d --build

services:
  postgres:
    image: postgres:15-alpine
    container_name: aurent-pos-db
    restart: unless-stopped
    command:
      - postgres
      - -c
      - max_connections=120
      - -c
      - shared_buffers=256MB
      - -c
      - work_mem=8MB
      - -c
      - effective_cache_size=768MB
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pos_db}
      POSTGRES_USER: ${POSTGRES_USER:-pos_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      TZ: ${TZ:-Asia/Tashkent}
    volumes:
      - pos_pg_data:/var/lib/postgresql/data
      # Схема и миграции — только Liquibase при старте backend (db/changelog/).
      # Не монтируйте SQL в docker-entrypoint-initdb.d — иначе три источника правды.
    ports:
      # Только localhost сервера — для DBeaver/DataGrip через SSH (не в интернет)
      - '127.0.0.1:5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-pos_user} -d ${POSTGRES_DB:-pos_db}']
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - pos-net

  backend:
    build:
      context: ./web-backend
      dockerfile: Dockerfile
    container_name: aurent-pos-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-pos_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-pos_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-pos_db}
      DB_USERNAME: ${POSTGRES_USER:-pos_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env (min 32 chars)}
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:*,http://127.0.0.1:*}
      ORDERS_UPLOAD_DIR: /app/uploads/orders
      LOG_PATH: /app/logs
      TZ: ${TZ:-Asia/Tashkent}
      AI_ASSISTANT_ENABLED: ${AI_ASSISTANT_ENABLED:-true}
      AI_ASSISTANT_PROVIDER: ${AI_ASSISTANT_PROVIDER:-deepseek}
      AI_ASSISTANT_BASE_URL: ${AI_ASSISTANT_BASE_URL:-https://api.deepseek.com}
      AI_ASSISTANT_MODEL: ${AI_ASSISTANT_MODEL:-deepseek-chat}
      AI_ASSISTANT_API_KEY: ${AI_ASSISTANT_API_KEY:-}
      AI_ASSISTANT_MAX_PROMPT_CHARS: ${AI_ASSISTANT_MAX_PROMPT_CHARS:-2000}
      AI_ASSISTANT_FAST_MODE: ${AI_ASSISTANT_FAST_MODE:-true}
      MAIL_ENABLED: ${MAIL_ENABLED:-true}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Aurent POS}
      MAIL_LOGIN_URL: ${MAIL_LOGIN_URL:-}
      MAIL_SUPER_ADMIN_LOGIN_RECIPIENTS: ${MAIL_SUPER_ADMIN_LOGIN_RECIPIENTS:-aripov1219@gmail.com,maxmudov71707@gmail.com}
      MAIL_SEND_CREDENTIALS_ON_CREATE: ${MAIL_SEND_CREDENTIALS_ON_CREATE:-true}
      MANAGEMENT_HEALTH_MAIL_ENABLED: "false"
      HIKARI_MAX_POOL_SIZE: ${HIKARI_MAX_POOL_SIZE:-25}
      HIKARI_MIN_IDLE: ${HIKARI_MIN_IDLE:-8}
      TOMCAT_MAX_THREADS: ${TOMCAT_MAX_THREADS:-100}
      SPRINGDOC_SWAGGER_UI_ENABLED: ${SPRINGDOC_SWAGGER_UI_ENABLED:-false}
      SPRINGDOC_API_DOCS_ENABLED: ${SPRINGDOC_API_DOCS_ENABLED:-false}
    ports:
      - '${API_PORT:-8080}:8080'
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://127.0.0.1:8080/api/v1/actuator/health | grep -q UP || exit 1']
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 60s
    networks:
      - pos-net

  frontend:
    build:
      context: ./web-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_SUPPORT_PHONE: ${VITE_SUPPORT_PHONE:-}
        VITE_SUPPORT_TELEGRAM_BOT: ${VITE_SUPPORT_TELEGRAM_BOT:-}
    container_name: aurent-pos-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - '${HTTP_PORT:-80}:80'
    volumes:
      - ./downloads:/var/downloads:ro
    networks:
      - pos-net

  telegram-support-bot:
    build:
      context: ./telegram-support-bot
      dockerfile: Dockerfile
    container_name: aurent-pos-telegram-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_SUPPORT_GROUP_ID: ${TELEGRAM_SUPPORT_GROUP_ID:-}
      TZ: ${TZ:-Asia/Tashkent}
    networks:
      - pos-net

networks:
  pos-net:
    driver: bridge

volumes:
  pos_pg_data:
  backend_uploads:
  backend_logs:
