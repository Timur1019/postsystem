name: Build Desktop Cashier

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'desktop-cashier/**'
      - 'web-frontend/**'
      - 'scripts/build-desktop-release.sh'
      - 'scripts/generate-desktop-manifest.sh'
      - 'scripts/build-cashier.sh'
      - 'installer/**'
      - 'downloads/desktop/**'
      - '.github/workflows/build-desktop.yml'
  workflow_dispatch:
    inputs:
      server_host:
        description: 'Default server host for installer wizard'
        required: true
        default: '111.88.132.126'

concurrency:
  group: desktop-release
  cancel-in-progress: true

env:
  SERVER_HOST: ${{ github.event.inputs.server_host || secrets.SERVER_HOST || '111.88.132.126' }}
  SERVER_WEB_PORT: '8081'
  SERVER_API_PORT: '8081'
  INCLUDE_WEB_DIST: '1'

jobs:
  build-mac:
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: desktop-cashier/package-lock.json

      - name: Build macOS installer
        run: |
          chmod +x scripts/*.sh
          for attempt in 1 2 3; do
            echo "==> Mac build attempt ${attempt}/3"
            if PLATFORM=mac COPY_TO_DOWNLOADS=1 \
              DESKTOP_UPDATE_URL="http://${SERVER_HOST}:${SERVER_WEB_PORT}/downloads/desktop/" \
              bash scripts/build-desktop-release.sh; then
              exit 0
            fi
            echo "Mac build failed (often Electron download EOF), retry in 20s..."
            sleep 20
          done
          exit 1

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-mac
          path: |
            downloads/desktop/*.dmg
            downloads/desktop/latest-mac.yml
            downloads/desktop/manifest.json
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: desktop-cashier/package-lock.json

      - name: Build Windows installer
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: |
          chmod +x scripts/*.sh
          PLATFORM=win COPY_TO_DOWNLOADS=1 \
            DESKTOP_UPDATE_URL="http://${SERVER_HOST}:${SERVER_WEB_PORT}/downloads/desktop/" \
            bash scripts/build-desktop-release.sh

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: desktop-win
          path: |
            downloads/desktop/*Setup*.exe
            downloads/desktop/Aurent-Cashier-Windows-portable-*.zip
            downloads/desktop/latest.yml
          if-no-files-found: warn

  package-and-deploy:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    if: |
      always() &&
      (needs.build-mac.result == 'success' || needs.build-windows.result == 'success') &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        continue-on-error: true
        id: download-mac
        with:
          name: desktop-mac
          path: artifacts/mac

      - uses: actions/download-artifact@v4
        continue-on-error: true
        id: download-win
        with:
          name: desktop-win
          path: artifacts/win

      - name: Assemble downloads/desktop
        run: |
          mkdir -p downloads/desktop
          shopt -s nullglob
          for src in artifacts/mac/downloads/desktop/* artifacts/win/downloads/desktop/*; do
            [[ -f "$src" ]] && cp -f "$src" downloads/desktop/
          done
          shopt -u nullglob
          find artifacts -type f \( -name '*.dmg' -o -name '*.exe' -o -name '*.zip' -o -name 'latest*.yml' \) \
            -exec cp -f {} downloads/desktop/ \;
          chmod +x scripts/*.sh
          bash scripts/generate-desktop-manifest.sh downloads/desktop
          cp installer/ДЛЯ-КАССИРА.txt downloads/desktop/ || true
          echo "=== Assembled ==="
          ls -lah downloads/desktop/
          python3 <<'PY'
          import glob, json, sys
          has_win = bool(glob.glob('downloads/desktop/*Setup*.exe'))
          has_mac = bool(glob.glob('downloads/desktop/*.dmg'))
          if not has_win and not has_mac:
              sys.exit('No desktop artifacts to deploy')
          m = json.load(open('downloads/desktop/manifest.json'))
          if has_win and not m.get('windows'):
              sys.exit('missing windows in manifest')
          if has_mac and not m.get('mac'):
              sys.exit('missing mac in manifest')
          print('manifest OK', json.dumps({
              'windows': m.get('windows', {}) and m['windows'].get('fileName'),
              'mac': m.get('mac') and m['mac'].get('fileName'),
          }))
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-release-bundle
          path: downloads/desktop/

      - name: Setup SSH for deploy
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_KEY_B64: ${{ secrets.DEPLOY_SSH_KEY_B64 }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import base64
          import os
          import subprocess
          from pathlib import Path

          raw = os.environ.get("DEPLOY_SSH_KEY", "").strip()
          b64 = os.environ.get("DEPLOY_SSH_KEY_B64", "").strip()
          key_path = Path.home() / ".ssh" / "deploy_key"
          key_path.parent.mkdir(mode=0o700, exist_ok=True)

          def validate(path: Path) -> None:
              path.chmod(0o600)
              subprocess.run(
                  ["ssh-keygen", "-y", "-f", str(path)],
                  check=True,
                  stdout=subprocess.DEVNULL,
                  stderr=subprocess.DEVNULL,
              )

          if b64:
              if b64.startswith("ssh-"):
                  raise SystemExit(
                      "DEPLOY_SSH_KEY_B64 содержит ПУБЛИЧНЫЙ ключ (ssh-ed25519...). "
                      "На Mac: base64 -i ~/.ssh/aurent-deploy | tr -d '[:space:]' | pbcopy"
                  )
              try:
                  data = base64.b64decode("".join(b64.split()), validate=True)
              except Exception as exc:
                  raise SystemExit(f"DEPLOY_SSH_KEY_B64 — неверный base64: {exc}") from exc
              key_path.write_bytes(data)
              validate(key_path)
          elif raw and "BEGIN" in raw:
              text = raw.replace("\r\n", "\n").replace("\r", "\n")
              if not text.endswith("\n"):
                  text += "\n"
              key_path.write_text(text, encoding="utf-8")
              try:
                  validate(key_path)
              except subprocess.CalledProcessError:
                  raise SystemExit(
                      "DEPLOY_SSH_KEY повреждён (GitHub часто ломает переносы строк). "
                      "Удалите DEPLOY_SSH_KEY и создайте DEPLOY_SSH_KEY_B64: "
                      "base64 -i ~/.ssh/aurent-deploy | tr -d '[:space:]' | pbcopy"
                  ) from None
          else:
              raise SystemExit(
                  "Нет рабочего secret. Создайте DEPLOY_SSH_KEY_B64:\n"
                  "  base64 -i ~/.ssh/aurent-deploy | tr -d '[:space:]' | pbcopy"
              )

          fp = subprocess.check_output(["ssh-keygen", "-l", "-f", str(key_path)], text=True)
          print("SSH key OK:", fp.split()[1] if fp else fp)
          PY

      - name: Deploy to production server
        continue-on-error: true
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER || 'root' }}
        run: |
          set -euo pipefail
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            'mkdir -p /opt/aurent-pos/downloads/desktop'
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes" \
            downloads/desktop/ \
            "${DEPLOY_USER}@${DEPLOY_HOST}:/opt/aurent-pos/downloads/desktop/"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            'ls -lah /opt/aurent-pos/downloads/desktop/'
          rm -f ~/.ssh/deploy_key
