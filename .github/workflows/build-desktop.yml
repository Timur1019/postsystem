name: Build Desktop Cashier

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'desktop-cashier/**'
      - 'scripts/build-desktop-release.sh'
      - 'scripts/generate-desktop-manifest.sh'
      - 'scripts/build-cashier.sh'
      - 'installer/**'
      - '.github/workflows/build-desktop.yml'
  workflow_dispatch:
    inputs:
      server_host:
        description: 'Default server host for installer wizard'
        required: true
        default: '111.88.132.126'

concurrency:
  group: desktop-release
  cancel-in-progress: true

env:
  SERVER_HOST: ${{ github.event.inputs.server_host || secrets.SERVER_HOST || '111.88.132.126' }}
  SERVER_WEB_PORT: '8081'
  SERVER_API_PORT: '8081'
  INCLUDE_WEB_DIST: '1'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: desktop-cashier/package-lock.json

      - name: Build macOS installer
        run: |
          chmod +x scripts/*.sh
          PLATFORM=mac COPY_TO_DOWNLOADS=1 \
            DESKTOP_UPDATE_URL="http://${SERVER_HOST}:${SERVER_WEB_PORT}/downloads/desktop/" \
            bash scripts/build-desktop-release.sh

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-mac
          path: |
            downloads/desktop/*.dmg
            downloads/desktop/latest-mac.yml
            downloads/desktop/manifest.json
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: desktop-cashier/package-lock.json

      - name: Build Windows installer
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: |
          chmod +x scripts/*.sh
          PLATFORM=win COPY_TO_DOWNLOADS=1 \
            DESKTOP_UPDATE_URL="http://${SERVER_HOST}:${SERVER_WEB_PORT}/downloads/desktop/" \
            bash scripts/build-desktop-release.sh

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: desktop-win
          path: |
            downloads/desktop/*Setup*.exe
            downloads/desktop/Aurent-Cashier-Windows-portable-*.zip
            downloads/desktop/latest.yml
          if-no-files-found: warn

  package-and-deploy:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.build-mac.result == 'success' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: desktop-mac
          path: artifacts/mac

      - uses: actions/download-artifact@v4
        continue-on-error: true
        id: download-win
        with:
          name: desktop-win
          path: artifacts/win

      - name: Assemble downloads/desktop
        run: |
          mkdir -p downloads/desktop
          shopt -s nullglob
          for src in artifacts/mac/downloads/desktop/* artifacts/win/downloads/desktop/*; do
            [[ -f "$src" ]] && cp -f "$src" downloads/desktop/
          done
          shopt -u nullglob
          find artifacts -type f \( -name '*.dmg' -o -name '*.exe' -o -name '*.zip' -o -name 'latest*.yml' \) \
            -exec cp -f {} downloads/desktop/ \;
          chmod +x scripts/*.sh
          bash scripts/generate-desktop-manifest.sh downloads/desktop
          cp installer/ДЛЯ-КАССИРА.txt downloads/desktop/ || true
          echo "=== Assembled ==="
          ls -lah downloads/desktop/
          python3 -c "import json; m=json.load(open('downloads/desktop/manifest.json')); assert m.get('mac'), 'missing mac'; print('manifest OK', json.dumps({k:m.get(k) and m[k].get('fileName') for k in ('windows','mac','zip')}))"

      - name: Deploy to production server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER || 'root' }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            'mkdir -p /opt/aurent-pos/downloads/desktop'
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes" \
            downloads/desktop/ \
            "${DEPLOY_USER}@${DEPLOY_HOST}:/opt/aurent-pos/downloads/desktop/"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            'ls -lah /opt/aurent-pos/downloads/desktop/'
          rm -f ~/.ssh/deploy_key

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-release-bundle
          path: downloads/desktop/
