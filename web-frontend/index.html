<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f1f5f9" />
    <script>
      (function () {
        try {
          document.documentElement.classList.remove('dark');
          document.documentElement.style.colorScheme = 'light';
          localStorage.removeItem('pos-theme');
          if (location.pathname.indexOf('/cashier') === 0) {
            var cashierTheme = localStorage.getItem('pos-cashier-theme');
            if (cashierTheme !== 'light' && cashierTheme !== 'dark') cashierTheme = 'dark';
            document.documentElement.classList.remove('cashier-theme--light', 'cashier-theme--dark');
            document.documentElement.classList.add(
              cashierTheme === 'light' ? 'cashier-theme--light' : 'cashier-theme--dark'
            );
          }
        } catch (e) {
          /* ignore */
        }
      })();
    </script>
    <title>Aurent</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
