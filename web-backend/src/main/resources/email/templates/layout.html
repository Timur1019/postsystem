<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{appName}}</title>
</head>
<body style="margin:0;padding:0;background:#f1f5f9;font-family:Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:#0f172a;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f1f5f9;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 10px 30px rgba(15,23,42,0.08);">
          <tr>
            <td style="background:linear-gradient(135deg,#059669,#10b981);padding:28px 32px;text-align:center;">
              <img src="{{logoUrl}}" alt="{{appName}}" width="64" height="64" style="display:block;margin:0 auto 12px;border-radius:14px;"/>
              <div style="font-size:22px;font-weight:700;color:#ffffff;letter-spacing:0.2px;">{{appName}}</div>
            </td>
          </tr>
          <tr>
            <td style="padding:32px;">
              {{content}}
            </td>
          </tr>
          <tr>
            <td style="padding:0 32px 28px;text-align:center;font-size:12px;color:#64748b;line-height:1.6;">
              © {{year}} {{appName}}. Это автоматическое сообщение, отвечать на него не нужно.
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
