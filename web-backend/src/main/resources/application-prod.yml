# Продакшен: только консоль (Docker/K8s собирают stdout), без лишнего шума
spring:
  liquibase:
    enabled: true
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  datasource:
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:25}
      minimum-idle: ${HIKARI_MIN_IDLE:8}
      connection-timeout: 30000

server:
  tomcat:
    threads:
      max: ${TOMCAT_MAX_THREADS:100}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
  health:
    mail:
      # SMTP не должен блокировать liveness (Gmail rate-limit ломает /actuator/health).
      enabled: false

logging:
  level:
    root: WARN
    com.pos: INFO

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
