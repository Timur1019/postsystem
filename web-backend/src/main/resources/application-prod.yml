# Продакшен: только консоль (Docker/K8s собирают stdout), без лишнего шума
spring:
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  datasource:
    hikari:
      connection-timeout: 30000

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
  health:
    mail:
      # SMTP не должен блокировать liveness (Gmail rate-limit ломает /actuator/health).
      enabled: false

logging:
  level:
    root: WARN
    com.pos: INFO

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
