server:
  port: 8080
  servlet:
    context-path: /api/v1
  tomcat:
    threads:
      max: ${TOMCAT_MAX_THREADS:80}
      min-spare: 10

spring:
  application:
    name: pos-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 80MB
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/pos_db}
    username: ${DB_USERNAME:pos_user}
    password: ${DB_PASSWORD:pos_password}
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:20}
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      max-lifetime: 1800000
      connection-timeout: 30000
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: ${LIQUIBASE_ENABLED:true}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        default_batch_fetch_size: 32
        jdbc:
          time_zone: UTC

app:
  security:
    user-cache:
      max-size: 2000
      ttl-minutes: 10
  errors:
    # В local можно APP_ERRORS_INCLUDE_CONTEXT=true — в ответе API будет context (entity, id…)
    include-context: ${APP_ERRORS_INCLUDE_CONTEXT:false}
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
  cache:
    window-months: 2
    refresh-cron: "0 0 1 * * *"
    zone-id: Asia/Tashkent
    loader-threads: 8
    parallel-refresh: true
    top-products-limit: 100
    sales-ledger:
      enabled: true
      load-chunks: 8
  orders:
    upload-dir: ${ORDERS_UPLOAD_DIR:uploads/orders}
  jwt:
    secret: ${JWT_SECRET:change-me-use-at-least-32-chars-for-hs256!!}
    expiration-ms: 86400000
  tasnif:
    enabled: true
    base-url: https://tasnif.soliq.uz/api/cl-api
    connect-timeout-ms: 5000
    read-timeout-ms: 10000
    default-lang: uz
    default-type: 2
    search-type: 1
  mail:
    enabled: ${MAIL_ENABLED:true}
    from: ${MAIL_FROM:${MAIL_USERNAME:}}
    from-name: ${MAIL_FROM_NAME:Aurent POS}
    login-url: ${MAIL_LOGIN_URL:http://localhost/login?admin=1}
    super-admin-login-recipients: ${MAIL_SUPER_ADMIN_LOGIN_RECIPIENTS:aripov1219@gmail.com,maxmudov71707@gmail.com}
    send-credentials-on-create: ${MAIL_SEND_CREDENTIALS_ON_CREATE:true}
  ai:
    enabled: ${AI_ASSISTANT_ENABLED:true}
    provider: ${AI_ASSISTANT_PROVIDER:deepseek}
    base-url: ${AI_ASSISTANT_BASE_URL:https://api.deepseek.com}
    api-key: ${AI_ASSISTANT_API_KEY:}
    model: ${AI_ASSISTANT_MODEL:deepseek-chat}
    connect-timeout-ms: ${AI_ASSISTANT_CONNECT_TIMEOUT_MS:5000}
    read-timeout-ms: ${AI_ASSISTANT_READ_TIMEOUT_MS:20000}
    max-prompt-chars: ${AI_ASSISTANT_MAX_PROMPT_CHARS:2000}
    max-requests-per-minute-per-user: ${AI_ASSISTANT_MAX_RPM_PER_USER:20}
    fast-mode: ${AI_ASSISTANT_FAST_MODE:true}
    max-tokens-insight: ${AI_ASSISTANT_MAX_TOKENS_INSIGHT:550}
    max-tokens-general-chat: ${AI_ASSISTANT_MAX_TOKENS_GENERAL:700}

logging:
  file:
    path: ${LOG_PATH:logs}
    name: ${LOG_FILE:logs/pos-backend.log}
  level:
    root: INFO
    com.pos: INFO

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true
  show-actuator: false
